name: PlatformIO CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        environment:
          - esp32_production
          - esp32_debug
          - esp32_ota

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Cache PlatformIO
      uses: actions/cache@v3
      with:
        path: |
          ~/.platformio
          .pio
        key: ${{ runner.os }}-pio-${{ hashFiles('**/platformio.ini') }}
        restore-keys: |
          ${{ runner.os }}-pio-

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    - name: Install PlatformIO
      run: |
        python -m pip install --upgrade pip
        pip install platformio

    - name: Build firmware (${{ matrix.environment }})
      run: pio run -e ${{ matrix.environment }}

    - name: Upload firmware artifact
      uses: actions/upload-artifact@v3
      with:
        name: firmware-${{ matrix.environment }}
        path: .pio/build/${{ matrix.environment }}/firmware.bin
        retention-days: 30

  test:
    runs-on: ubuntu-latest
    needs: build

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    - name: Install PlatformIO
      run: |
        python -m pip install --upgrade pip
        pip install platformio

    - name: Run tests
      run: pio test -e esp32_test
      continue-on-error: true  # Don't fail build if tests not implemented yet

  lint:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    - name: Install PlatformIO
      run: |
        python -m pip install --upgrade pip
        pip install platformio

    - name: Run static analysis
      run: pio check --skip-packages
      continue-on-error: true  # Don't fail on warnings initially

  release:
    runs-on: ubuntu-latest
    needs: [build, test]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Download firmware artifacts
      uses: actions/download-artifact@v3

    - name: Create release directory
      run: mkdir -p release

    - name: Prepare release files
      run: |
        cp firmware-esp32_production/firmware.bin release/JK_BMS_Master_v${{ github.run_number }}.bin
        cp firmware-esp32_ota/firmware.bin release/JK_BMS_Master_OTA_v${{ github.run_number }}.bin
        echo "Build: ${{ github.run_number }}" > release/VERSION.txt
        echo "Commit: ${{ github.sha }}" >> release/VERSION.txt
        echo "Date: $(date)" >> release/VERSION.txt

    - name: Create GitHub Release
      uses: softprops/action-gh-release@v1
      if: startsWith(github.ref, 'refs/tags/')
      with:
        files: release/*
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
