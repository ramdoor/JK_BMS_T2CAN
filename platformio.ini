; PlatformIO Project Configuration File
;
; JK BMS T-2CAN Controller
; ESP32-S3 based Battery Management System (Lilygo T-2CAN board)
;
; Build profiles:
;   - t2can: Production build with optimizations
;   - t2can_debug: Debug build with symbols and logging
;   - t2can_ota: OTA-enabled build for remote updates

[platformio]
default_envs = t2can
boards_dir = boards
description = JK BMS T-2CAN Controller with multi-protocol inverter support

; ============================================================
; Common configuration for all environments
; ============================================================
[env]
platform = espressif32@6.5.0
framework = arduino
board = esp32s3_flash_16MB
monitor_speed = 115200
monitor_filters =
    esp32_exception_decoder
    colorize
upload_speed = 921600
upload_flags =
    --before=usb_reset

; Common build flags
build_flags =
    -D CORE_DEBUG_LEVEL=0
    -D ARDUINO_RUNNING_CORE=1
    -D ARDUINO_EVENT_RUNNING_CORE=1
    -D ARDUINO_USB_CDC_ON_BOOT=1
    -D BOARD_HAS_PSRAM
    -Wall
    -Wextra
    -Wno-unused-parameter

; Libraries required
lib_deps =
    knolleary/PubSubClient@^2.8
    bblanchon/ArduinoJson@^7.0.0
    autowp/autowp-mcp2515@^1.3.1

; Extra scripts
extra_scripts =
    pre:scripts/version_increment.py

; ============================================================
; Production Environment (T-2CAN board)
; ============================================================
[env:t2can]
build_type = release
build_flags =
    ${env.build_flags}
    -D PRODUCTION_BUILD
    -D BOARD_T2CAN
    -D CONTACTOR_MIN_TOGGLE_MS=1500
    -D CELL_OV_HYST=0.020
    -D CELL_UV_HYST=0.020
    -D CAN_TX=7
    -D CAN_RX=6
    -D MCP2515_CS=10
    -D MCP2515_SCK=12
    -D MCP2515_MOSI=11
    -D MCP2515_MISO=13
    -D MCP2515_RST=9
    -D HA_DISCOVERY
    -O2
    -ffunction-sections
    -fdata-sections

board_build.partitions = default_16MB.csv
board_build.filesystem = littlefs

; ============================================================
; Debug Environment
; ============================================================
[env:t2can_debug]
build_type = debug
build_flags =
    ${env:t2can.build_flags}
    -D DEBUG_BUILD
    -D CORE_DEBUG_LEVEL=5
    -D DEBUG_ESP_PORT=Serial
    -D DEBUG_ESP_CORE
    -D DEBUG_ESP_WIFI
    -O0
    -g3

monitor_filters =
    esp32_exception_decoder
    colorize
    log2file

; ============================================================
; OTA Environment (for remote updates)
; ============================================================
[env:t2can_ota]
build_type = release
build_flags =
    ${env:t2can.build_flags}
    -D OTA_ENABLED

upload_protocol = espota
upload_port = 192.168.1.100  ; Update with your ESP32-S3 IP
upload_flags =
    --auth=OTAPassword         ; Update with your OTA password
    --port=3232
